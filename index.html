<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce </title>
    <link rel="stylesheet" href="./cs.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <header class="px-0 py-0 px-md-5 py-md-3">
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">

                <a class="navbar-brand fw-bold fs-3" href="./index.html">Ecommerce</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav mb-2 mb-lg-0 ms-auto">
                        <li class="nav-item">
                            <a href="./index.html" class="nav-link fs-6 fw-bold">Home</a>
                        </li>
                        <li class="nav-item">
                            <a href="./product.html" class="nav-link fs-md-3 fs-6">Products</a>
                        </li>
                        <li class="nav-item">
                            <a href="./About.html" class="nav-link fs-6">About</a>
                        </li>
                        <li class="nav-item">
                            <a href="./Contact.html" class="nav-link fs-6">Contact</a>
                        </li>
                    </ul>

                    <ul class="navbar-nav ms-auto buts">
                        <li class="head-acc nav-item me-lg-2 mb-2 btn-hover">
                            <a href="./login.html" class="btn border-1 border-black">
                                <span><i class="bi bi-box-arrow-in-right"></i></span>
                                <span class="fs-6">Login</span>
                            </a>
                        </li>
                        <li class="head-acc nav-item me-lg-2 mb-2 btn-hover">
                            <a href="./register.html" class="btn border-1 border-black">
                                <span><i class="bi bi-person-plus-fill"></i></span>
                                <span class="fs-6">Register</span>
                            </a>
                        </li>
                        <li class="head-acc nav-item me-lg-2 mb-2 btn-hover">
                            <a href="./cart.html" class="btn border-1 border-black">
                                <span><i class="bi bi-cart-fill"></i></span>
                                <span class="fs-6">Cart(<span class="prod-length"></span>)</span>
                            </a>
                        </li>
                    </ul>
                </div>

            </div>
        </nav>
    </header>










    <main>
        <div class="card text-bg-dark ms-2 me-4 ">
            <img src="./photos/main.png.jpg" class="card-img custom-img" alt="logo">
            <div class="card-img-overlay d-flex flex-column justify-content-center align-items-start">
                <h1 class="card-title">New Season Arrivals</h1>
                <p class="card-text">
                    This is a wider card with supporting text below as a natural lead-in to additional content.
                    <span class="d-none d-lg-inline">This content is a little bit longer.</span>
                </p>
            </div>
        </div>

        <h1 class=" text-center" style="margin-top:5%;">Latest Products</h1>
        <hr style="width:80% ;margin-left: 10%;border:2px solid black">
        <nav class="d-flex justify-content-center gap-3 flex-wrap">
            <button id="allp" class="btn btn-outline-dark">All</button>
            <button id="mensp" class="btn btn-outline-dark">Mens Clothing</button>
            <button id="womensp" class="btn btn-outline-dark">Womens Clothing</button>
            <button id="jewerlyp" class="btn btn-outline-dark">Jewelry</button>
            <button id="electronicp" class="btn btn-outline-dark">Electronics</button>
        </nav>


        <div id="prod-container"></div>



    </main>





    <footer class="text-center fs-4 ">
        <p>Made with <i class="bi bi-heart-fill text-danger"></i>by Munisai</p>
    </footer>












    <script src="./js.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
