    <main>



        <h1 class=" text-center" style="margin-top:2%;">Register</h1>
        <hr style="width:80% ;margin-left: 10%;border:2px solid black">


        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-4 col-md-6 col-sm-10">

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" placeholder="Enter Your name">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email address</label>
                        <input type="email" class="form-control" placeholder="name@example.com">
                    </div>


                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="Password" class="form-control" placeholder="Your name">
                    </div>
                    <p>Already have an account? <a href="./login.html">Login</a></p>

                    <div class="text-center mt-5">
                        <button type="submit" class="btn btn-dark w-25 disabled">
                            Sent
                        </button>
                    </div>
                </div>
            </div>
